<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    @page { size: A4 portrait; margin: 15mm 15mm; }
    html, body { background: #fff; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', Tahoma, Arial, sans-serif;
      font-size: 12px; color: #333; line-height: 1.5;
    }

    /* Common Header Classes */
    .header-container, .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #1e3a8a; padding-bottom: 15px; }
    .org-name, .title { font-size: 20px !important; font-weight: bold; color: #1e3a8a; margin-bottom: 5px; margin-top: 5px; }
    .report-title, .period, .subtitle { font-size: 16px !important; font-weight: bold; color: #333; margin-top: 5px; }
    .meta, .note { font-size: 12px !important; color: #666; margin-top: 5px; }
    .note { color: #dc2626; font-style: italic; }
    
    .rule { height: 2px; background: #f59e0b; margin: 15px 0 20px; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 20px; table-layout: fixed; }
    th, td { 
      border: 1px solid #666; padding: 6px 8px; vertical-align: top; 
      word-wrap: break-word; font-size: 12px !important; line-height: 1.4;
    }
    thead th, th { 
      background-color: #f1f5f9; font-weight: bold; color: #1e3a8a; text-align: center; font-size: 12px !important; 
    }
    .total-row { font-weight: bold; background-color: #f8fafc; }
    tbody tr:nth-child(even) { background-color: #f8fafc; }

    /* Utilities */
    .tright, .text-right { text-align: right !important; }
    .tcenter, .text-center { text-align: center !important; }
    .tleft, .text-left { text-align: left !important; }
    
    .badge-active { color: #166534; font-weight: bold; }
    .badge-expired { color: #991b1b; font-weight: bold; }

    /* Sections / Boxes */
    .section-head, h2 { 
      font-size: 14px !important; font-weight: bold; margin: 20px 0 10px 0; 
      color: #1e3a8a; border-left: 4px solid #f59e0b; padding-left: 10px; text-align: left;
    }
    .summary-box, .stats-container { 
      background-color: #f8fafc; border: 1px solid #cbd5e1; 
      padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 12px !important; line-height: 1.6;
    }
    .summary-item { 
      width: 23%; padding: 15px 10px; background: #f8fafc; border-radius: 8px; 
      text-align: center; border: 1px solid #e2e8f0; 
    }
    .summary-value { font-size: 18px !important; font-weight: bold; color: #1e3a8a; }
    .summary-label { font-size: 11px !important; color: #64748b; margin-top: 5px; }

    .stats-grid { display: table; width: 100%; font-size: 12px !important; }
    .stats-row { display: table-row; }
    .stats-cell { display: table-cell; padding: 5px 0; font-size: 12px !important; }

    /* Footer */
    .footer { 
      margin-top: 30px; font-size: 10px !important; color: #666; 
      text-align: right; border-top: 1px solid #eee; padding-top: 10px; 
    }

    /* Wrap Modifiers */
    .limit-lines, .clamp-text {
      display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;
    }
    tr { page-break-inside: avoid; }
    .break { page-break-after: always; }
  </style>
</head>
<body>
  <div class="header-container">
    <div class="org-name">มหาวิทยาลัยสวนดุสิต ศูนย์การศึกษาลำปาง</div>
    <div class="report-title">รายงานสรุปการแจ้งซ่อมประจำเดือน</div>
    <div class="meta">ประจำงวด: <?= period ?></div>
  </div>

  <div class="stats-container">
    <div class="stats-grid">
      <div class="stats-row">
        <div class="stats-cell" style="width:50%"><strong>จำนวนรายการซ่อม:</strong> <?= stats.total ?> ครั้ง</div>
        <div class="stats-cell"><strong>ค่าใช้จ่ายรวม:</strong> <?= stats.cost ?> บาท</div>
      </div>
      <div class="stats-row">
        <div class="stats-cell"><strong>รถที่เข้าซ่อมบ่อย:</strong> <?= stats.topPlate ?></div>
        <div class="stats-cell"><strong>ประเภทงานยอดนิยม:</strong> <?= stats.topType ?></div>
      </div>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width:12%">ทะเบียน</th>
        <th style="width:15%">ประเภทงาน</th>
        <th style="width:13%">วันที่ซ่อม</th>
        <th style="width:13%">ค่าใช้จ่าย</th>
        <th style="width:13%">นัดถัดไป</th>
        <th style="width:34%">รายละเอียด / หมายเหตุ</th>
      </tr>
    </thead>
    <tbody>
      <? if (list.length === 0) { ?>
        <tr><td colspan="6" style="padding: 20px;">-- ไม่พบข้อมูลการซ่อมบำรุง --</td></tr>
      <? } else { 
          for (var i = 0; i < list.length; i++) { ?>
        <tr>
          <td><strong><?= list[i].plate ?></strong></td>
          <td><?= list[i].type ?></td>
          <td><?= list[i].date ?></td>
          <td class="text-right"><?= list[i].cost ?></td>
          <td><?= list[i].next ?></td>
          <td class="text-left"><div class="clamp-text"><?= list[i].remark ?></div></td>
        </tr>
      <? } } ?>
    </tbody>
  </table>

  <div class="footer">
    พิมพ์โดย: <?= systemName ?><br>
    วันที่ออกรายงาน: <?= generatedAt ?>
  </div>
</body>
</html>
